<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DietMarket - Mercado Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛒 DietMarket</h1>
            <p>Ecosistema de sincronización de precios en la nube para Calcudiett</p>
        </div>
    </header>
    <main class="container">
        <section class="dashboard-grid">
            <div class="card">
                <h3>Estado del Mercado</h3>
                <p class="status-online">● ONLINE</p>
            </div>
            <div class="card">
                <h3>Endpoint Activo</h3>
                <p class="code-text">/mercado.json</p>
            </div>
        </section>
        <section class="table-section">
            <h2>📦 Catálogo Base (Simulación de Precios)</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID Ref</th>
                            <th>Alimento</th>
                            <th>Distribuidor / Variante</th>
                            <th>Precio Base</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
